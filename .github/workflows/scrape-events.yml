name: Scrape Events

on:
  schedule:
    - cron: '0 8 * * *'   # Daily at 8 AM UTC (1 AM Pacific)
  workflow_dispatch:        # Manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scraper/package-lock.json

      - name: Install scraper dependencies
        run: npm ci
        working-directory: scraper

      - name: Run scraper
        run: npx tsx src/index.ts
        working-directory: scraper

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet src/lib/scrapedEvents.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/lib/scrapedEvents.json
          git commit -m "chore: update scraped events $(date -u +%Y-%m-%d)"
          git push
